name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(find . -name '*.go' -not -path './vendor/*' -print0 | xargs -0 gofmt -l)"
          if [[ -n "${unformatted}" ]]; then
            echo "The following files need gofmt:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build -trimpath ./cmd/ms

  cross-platform-build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install and build frontend
        run: |
          cd frontend && npm ci && npm run build
          rm -rf ../internal/api/frontend_dist
          cp -r dist ../internal/api/frontend_dist

      - name: Cross build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          ext=""
          if [[ "${GOOS}" == "windows" ]]; then
            ext=".exe"
          fi
          out="dist/ms-${GOOS}-${GOARCH}${ext}"
          go build -trimpath \
            -ldflags "-X main.Version=dev -X main.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -tags embed_frontend \
            -o "${out}" ./cmd/ms

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ms-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
